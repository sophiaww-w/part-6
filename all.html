<!DOCTYPE html>
<html>
<head>
  <title>All Organizations</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>All Organizations</h1>

<div id="list"></div>

<script src="data.js"></script>

<script>
document.getElementById("list").innerHTML =
  orgData.map(o => `
    <div style="background:#111; margin:10px auto; padding:15px; width:60%; border-radius:12px;">
      <h3>${o.name}</h3>
      <p>${o.city}, ${o.country}</p>
      <button onclick="location.href='org.html?id=${o.id}'">
        View
      </button>
    </div>
  `).join("");
</script>

</body>
</html>
